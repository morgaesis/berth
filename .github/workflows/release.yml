---
name: Release

"on":
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: Full E2E (real podman gated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman fuse-overlayfs uidmap

      - name: Library tests
        run: cargo test --lib --quiet

      - name: E2E tests with real podman
        env:
          # The runner has podman (installed above) but no kubeconfig
          # or reachable cluster. Disable the k8s e2e here; the podman
          # half runs against the real binary by default.
          BERTH_E2E_K8S_ENABLED: "false"
        run: cargo test --test e2e --quiet

  build:
    name: Build ${{ matrix.target }}
    needs: e2e
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Dynamic-libc Linux builds (for distros, mirrors, etc.).
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: berth
            asset_name: berth-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: berth
            asset_name: berth-aarch64-unknown-linux-gnu.tar.gz
            use_cross: true
          # Static-musl builds — these are what `berth deploy` fetches.
          # No glibc dependency, runs on busybox/openwrt/alpine/scratch.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: berth
            asset_name: berth-x86_64-unknown-linux-musl.tar.gz
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: berth
            asset_name: berth-aarch64-unknown-linux-musl.tar.gz
            use_cross: true
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            artifact_name: berth
            asset_name: berth-armv7-unknown-linux-musleabihf.tar.gz
            use_cross: true
          # macOS native.
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: berth
            asset_name: berth-aarch64-apple-darwin.tar.gz
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build (native)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          BIN="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          strip "$BIN" || true

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/
          cd dist
          tar -czf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          # SHA256 sidecar — same format `sha256sum` produces, which our
          # `deploy::fetch` parses.
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' -o -name '*.zip' \) -exec mv {} release/ \;
          ls -l release

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: release/*
          generate_release_notes: true
