---
name: Release

"on":
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: Full E2E (real podman gated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman fuse-overlayfs uidmap

      - name: Library tests
        run: cargo test --lib --quiet

      - name: E2E tests with real podman
        env:
          BERTH_REAL_PODMAN_E2E: "1"
        run: cargo test --test e2e --quiet

  build:
    name: Build ${{ matrix.target }}
    needs: e2e
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Dynamic-libc Linux builds (for distros, mirrors, etc.).
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: berth
            asset_name: berth-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: berth
            asset_name: berth-aarch64-unknown-linux-gnu.tar.gz
            use_cross: true
          # Static-musl builds — these are what `berth deploy` fetches.
          # No glibc dependency, runs on busybox/openwrt/alpine/scratch.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: berth
            asset_name: berth-x86_64-unknown-linux-musl.tar.gz
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: berth
            asset_name: berth-aarch64-unknown-linux-musl.tar.gz
            use_cross: true
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            artifact_name: berth
            asset_name: berth-armv7-unknown-linux-musleabihf.tar.gz
            use_cross: true
          # macOS native.
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: berth
            asset_name: berth-aarch64-apple-darwin.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build (native)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          BIN="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          strip "$BIN" || true

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/
          cd dist
          tar -czf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          # SHA256 sidecar — same format `sha256sum` produces, which our
          # `deploy::fetch` parses.
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' -o -name '*.zip' \) -exec mv {} release/ \;
          ls -l release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
