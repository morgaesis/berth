<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="600"
     viewBox="0 0 1200 600">
  <!--
    Hand-authored demo for the README. Two scenes, fade transition.
    Scene 1: `berth enter dev` drops into the workspace's bundled
             command (python3) in /home/dev/code/dev. The user types
             a couple of expressions.
    Scene 2: a new tab opens; the shell hook auto-replays the same
             `berth enter dev` (force-new), landing in an independent
             python REPL in the same dir. No re-typing.

    Total animation: 14s, infinite loop. The transition is a hard
    clear at the 7s mark — the same shape a real new-tab opening
    via the hook would produce.

    This is hand-edited on purpose. The previous asciinema +
    svg-term pipeline produced bloated SVGs whose timing was hard to
    tune and which loaded slowly; manual authoring is ~10x smaller
    and gives full control over what's shown.

    Identifiers are generic (workspace `dev`, dir `~/code/dev`,
    bundled command `python3`) — nothing here ties to a real user
    or project.
  -->
  <style>
    text {
      font-family: 'JetBrains Mono', 'Monaco', 'Consolas', monospace;
      font-size: 18px;
      fill: #b9c0cb;
      white-space: pre;
    }
    .prompt   { fill: #a8cc8c; font-weight: 700; }
    .py       { fill: #a8cc8c; font-weight: 700; }
    .cyan     { fill: #66c2cd; }
    .dim      { fill: #6f7683; }
    .yellow   { fill: #dbab79; }
    .tabname  { fill: #6f7683; font-size: 13px; }

    @keyframes scene-a {
      0%, 47% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes scene-b {
      0%, 50% { opacity: 0; }
      53%, 100% { opacity: 1; }
    }
    .scene-a { animation: scene-a 14s infinite; }
    .scene-b { animation: scene-b 14s infinite; }

    /* Blinking REPL cursor in each scene. */
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .caret { animation: blink 1s steps(1) infinite; fill: #b9c0cb; }
  </style>

  <!-- Window chrome (Tokyo-Night-ish dark bg + traffic-light dots). -->
  <rect x="0" y="0" width="1200" height="600" rx="10" fill="#282d35"/>
  <circle cx="22" cy="22" r="6" fill="#ff5f58"/>
  <circle cx="42" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="22" r="6" fill="#18c132"/>

  <!-- ─── Scene 1 ──────────────────────────────────────────────────
       Tab label, the `berth enter` invocation, the python REPL with
       a small interaction. -->
  <g class="scene-a">
    <text x="1100" y="27" class="tabname">tab 1</text>

    <text x="22" y="80"><tspan class="prompt">$ </tspan>berth enter dev</text>

    <text x="22" y="115">Python 3.12.5 (main, Aug 14 2024, 05:12:24) [GCC 12.2.0] on linux</text>
    <text x="22" y="140">Type "help", "copyright", "credits" or "license" for more information.</text>

    <text x="22" y="180"><tspan class="py">&gt;&gt;&gt; </tspan>from pathlib import Path</text>
    <text x="22" y="205"><tspan class="py">&gt;&gt;&gt; </tspan>Path.cwd()</text>
    <text x="22" y="230"><tspan class="cyan">PosixPath('/home/dev/code/dev')</tspan></text>

    <text x="22" y="270"><tspan class="py">&gt;&gt;&gt; </tspan>2 ** 16</text>
    <text x="22" y="295"><tspan class="cyan">65536</tspan></text>

    <text x="22" y="335"><tspan class="py">&gt;&gt;&gt; </tspan><tspan class="caret">▌</tspan></text>

    <text x="22" y="555" class="dim">workspace 'dev' — bundled command: bash -c 'cd ~/code/dev &amp;&amp; python3'</text>
    <text x="22" y="575" class="dim">press meta+t (or ctrl+shift+t) to open a new tab…</text>
  </g>

  <!-- ─── Scene 2 ──────────────────────────────────────────────────
       New tab opened. The shell hook saw the marker the prior tab
       left, evals the cached `berth enter dev` (force-new) line, and the
       new shell lands in its own python REPL in the same dir.
       Single, independent session. -->
  <g class="scene-b">
    <text x="1100" y="27" class="tabname">tab 2</text>

    <text x="22" y="80" class="dim">↪ new-tab hook auto-entered 'dev'  (1/3; `defaults.new_tab_auto_entry: false` to opt out)</text>

    <text x="22" y="120">Python 3.12.5 (main, Aug 14 2024, 05:12:24) [GCC 12.2.0] on linux</text>
    <text x="22" y="145">Type "help", "copyright", "credits" or "license" for more information.</text>

    <text x="22" y="185"><tspan class="py">&gt;&gt;&gt; </tspan>Path.cwd()</text>
    <text x="22" y="210"><tspan class="cyan">PosixPath('/home/dev/code/dev')</tspan></text>

    <text x="22" y="250"><tspan class="py">&gt;&gt;&gt; </tspan><tspan class="caret">▌</tspan></text>

    <text x="22" y="555" class="dim">same workspace, fresh python session — no re-typing, no re-sshing.</text>
    <text x="22" y="575" class="dim">tab 1 is still alive over there; close one without touching the other.</text>
  </g>
</svg>
